<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAIL – Lessons</title>

<style>
    body {
        background:#f5f5f5;
        font-family: Arial;
        padding:20px;
    }

    /* Top menu */
    .menu {
        background:#222;
        padding:10px;
        text-align:right;
    }
    .menu a {
        color:white;
        margin-left:15px;
        text-decoration:none;
    }

    .card {
        background:white;
        padding:20px;
        margin-top:20px;
        border-radius:10px;
        box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    select {
        background:#333;
        color:white;
        padding:8px;
        border-radius:5px;
    }

    button {
        padding:8px 15px;
        background:#333;
        color:white;
        border:none;
        border-radius:5px;
        cursor:pointer;
    }

    button:hover {
        background:#555;
    }

    .sentence-box {
        margin-top:20px;
        padding:20px;
        background:#eee;
        border-radius:10px;
    }
</style>
</head>

<body>

<!-- Navigation Menu -->
<nav class="menu">
    <a href="index.html">Home</a>
    <a href="letters.html">Letters</a>
    <a href="lessons.html">Lessons</a>
    <a href="about.html">About</a>
</nav>

<h2>LAIL – Sentence Lessons</h2>

<div class="card">
    <h3>Choose Language to Learn</h3>

    <!-- Language selection -->
    <select id="learningLanguage">
        <option value="">-- Select --</option>
        <option>Malayalam</option>
        <option>Tamil</option>
        <option>Kannada</option>
        <option>Telugu</option>
        <option>Hindi</option>
        <option>Odiya</option>
        <option>Punjabi</option>
        <option>Sanskrit</option>
        <option>Bodo</option>
        <option>Assamese</option>
        <option>English</option>
    </select>
</div>


<div class="card">
    <h3>Level <span id="levelNum">1</span></h3>

    <div class="sentence-box" id="sentenceBox">
        <!-- Sentences will appear here -->
    </div>

    <h4>Transliteration (in English)</h4>
    <input type="text" id="translit" placeholder="Type transliteration here" style="width:100%; padding:10px;">

    <br><br>

    <button onclick="prevLevel()">◀ Previous</button>
    <button onclick="nextLevel()">Next ▶</button>
</div>

<script>

// ---------------------------
// SENTENCE LEVELS
// ---------------------------
const lessons = [
    {
        level: 1,
        sentences: [
            { en: "How are you?", ml: "സുഖമാണോ?" },
            { en: "I am fine.", ml: "എനിക്ക് സുഖമാണ്." }
        ]
    },

    {
        level: 2,
        sentences: [
            { en: "What is your name?", ml: "നിങ്ങളുടെ പേര് എന്താണ്?" },
            { en: "My name is...", ml: "എന്റെ പേര് ..." }
        ]
    },

    {
        level: 3,
        sentences: [
            { en: "Where are you going?", ml: "നിങ്ങൾ എവിടേക്ക് പോകുന്നു?" },
            { en: "I am going home.", ml: "ഞാൻ വീട്ടിലേക്ക് പോകുന്നു." }
        ]
    }
];

let currentLevel = 1;

// ---------------------------
// DISPLAY SENTENCES
// ---------------------------
function showLevel() {
    document.getElementById("levelNum").innerText = currentLevel;

    const box = document.getElementById("sentenceBox");
    const lesson = lessons[currentLevel - 1];

    box.innerHTML = "";

    lesson.sentences.forEach(s => {
        box.innerHTML += `<p><b>${s.en}</b><br>${s.ml}</p>`;
    });
}

showLevel();

// ---------------------------
// NEXT / PREVIOUS LEVEL
// ---------------------------
function nextLevel() {
    if (currentLevel < lessons.length) {
        currentLevel++;
        showLevel();
    }
}

function prevLevel() {
    if (currentLevel > 1) {
        currentLevel--;
        showLevel();
    }
}

</script>

</body>
</html>
