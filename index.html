<!DOCTYPE html>
<html>
<head>
  <title>Background Remover</title>
  <style>
    body { background:#0a0f1a; color:white; font-family:Arial; text-align:center; }
    img { max-width:300px; margin:20px; border:1px solid #444; }
    button { padding:10px 20px; margin:10px; }
  </style>
</head>
<body>

<h1>Background Remover</h1>

<input type="file" id="fileInput" accept="image/*" />
<br><br>

<img id="preview" />

<br>
<button onclick="removeBG()">Remove Background</button>

<h3>Output:</h3>
<img id="outputImg" />

<script>
let selectedFile = null;

document.getElementById("fileInput").addEventListener("change", function(e) {
    selectedFile = e.target.files[0];

    // Preview input
    const url = URL.createObjectURL(selectedFile);
    document.getElementById("preview").src = url;
});

async function removeBG() {
    if (!selectedFile) return alert("Choose an image first!");

    let formData = new FormData();
    formData.append("image", selectedFile);

    const res = await fetch("http://localhost:5000/remove-bg", {
        method: "POST",
        body: formData
    });

    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    document.getElementById("outputImg").src = url;
}
</script>

</body>
</html>
