<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📖 Multi-Language Dictionary</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>📖 Multi-Language Dictionary</h1>
        
        <div class="controls-bar">
            <select id="languageSelect" class="language-select">
                <option value="MALAYALAM">English - Malayalam</option>
                <option value="BODO">English - Bodo</option>
                <option value="MAITHILI">English - Maithili</option>
            </select>
            <button id="adminLoginBtn" class="theme-button admin-btn">🔑 Admin</button>
            <button id="contactButton" class="contact-button">📞 Contact</button>
            <button id="themeToggle" class="theme-button">☀️ Theme</button>
        </div>
        
        <div id="adminPanel" class="description-box admin-box" style="display:none;">
            <h3 id="adminPanelTitle">🛠 Admin Panel</h3>
            <div class="admin-form">
                <input type="text" id="newEnglish" placeholder="English Word">
                <input type="text" id="newTranslation" placeholder="Native Translation">
                <input type="text" id="newType" placeholder="Transliteration / Explanation">
                <button onclick="saveNewWord()" class="save-btn">Save to Sheet</button>
                <button onclick="logout()" class="back-button" style="background-color: #666; margin-top: 10px;">Logout</button>
            </div>
        </div>

        <div id="contactArea" class="description-box contact-box" style="display:none;">
            <h3>📬 Contact</h3>
            <a href="https://mail.google.com/mail/?view=cm&fs=1&to=yaduk883@gmail.com" target="_blank" class="contact-link-button email-button">📧 Email</a>
            <a href="https://github.com/yaduk883" target="_blank" class="contact-link-button github-button">🐙 GitHub</a>
            <a href="https://instagram.com/ig.yadu/\" target="_blank" class="contact-link-button instagram-button">📸 Instagram</a>
            <button onclick="contactMe()" class="contact-link-button close-button" style="background-color: #444; margin-top: 10px;">Close</button>
        </div>

        <div id="searchArea">
            <input type="text" id="searchInput" placeholder="🔍 Search English or Native word...">
        </div>

        <p id="statusMessage" class="info">Loading dictionary...</p>

        <div id="descriptionArea" class="description-box" style="display:none;">
            <h3 id="descriptionTitle"></h3>
            <div id="definitionText"></div>
            <button id="backButton" class="back-button">← Back to Results</button>
        </div>

        <div id="bookTableContainer" style="display:none;">
            <table id="bookTable">
                <thead>
                    <tr>
                        <th>English Word</th>
                        <th>Translation</th>
                    </tr>
                </thead>
                <tbody id="bookTableBody"></tbody>
            </table>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
