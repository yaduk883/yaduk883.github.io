<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Yadu's Book Library</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1> Yadu's Book Library</h1>
        
        <div class="controls">
            <input type="text" id="searchInput" placeholder="🔍 Search by Book Name or Author...">
        </div>

        <p id="statusMessage" class="info">Loading book data...</p>

        <div id="bookTableContainer">
            <table id="bookTable">
                <thead>
                    <tr>
                        <th>Name of Book</th>
                        <th>Author</th>
                        <th>Language</th>
                        <th>N.o of Copies</th>
                        <th>Available/Not</th>
                        <th>Checked Out By</th>
                    </tr>
                </thead>
                <tbody id="bookTableBody">
                    </tbody>
            </table>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
